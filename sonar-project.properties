# SonarQube Configuration File for Vigía 54
sonar.projectKey=vigia54
sonar.projectName=Vigía 54
sonar.projectVersion=1.0.0

# Path to the source code directories
sonar.sources=web/src,firebase/functions/src

# Path to the test files
sonar.tests=web/src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclusions from source scanning
sonar.exclusions=node_modules/**,web/out/**,web/.next/**,firebase/.firebase/**,firebase/public/**,**/*.test.ts,**/*.test.tsx

# Code coverage reports mapping (from Jest)
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8
